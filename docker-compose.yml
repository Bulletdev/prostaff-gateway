services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4444:4444"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gateway-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:4444/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway-network

networks:
  gateway-network:
    driver: bridge
